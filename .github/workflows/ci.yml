name: Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Ruff
        run: python -m pip install ruff==0.15.9

      - name: Ruff format
        run: python -m ruff format --check --diff .

      - name: Ruff lint
        run: python -m ruff check --output-format=full .

  python-checks:
    name: Ruff + Mypy + Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format
        run: python -m ruff format --check --diff .

      - name: Ruff lint
        run: python -m ruff check --output-format=full .

      - name: Mypy static type checks
        run: python -m mypy

      - name: Repository hygiene checks
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Pytest tests
        run: python -m pytest

      - name: Build package
        run: python -m build

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test installed package
        run: python -c "import mypackage; print(mypackage.do_useful_thing())"
